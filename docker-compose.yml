services:
  # servidor de rastreamento de experimentos
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns

  # treino (one-off): gera os modelos e loga no mlflow
  train:
    build: .
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GIT_PYTHON_REFRESH: quiet   # silencia aviso do mlflow quando nao ha git na imagem
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
    command: python -m src.train

  # servico da API + pagina web
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: unless-stopped

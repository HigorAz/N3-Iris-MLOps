# Definicao dos 3 modelos comparados no treino.
# Trocar hiperparametro aqui nao exige mexer no codigo.
modelos:
  - nome: random_forest
    tipo: sklearn_rf
    params:
      n_estimators: 200
      max_depth: 5

  - nome: svm
    tipo: sklearn_svm
    params:
      C: 1.0
      kernel: rbf

  - nome: rede_neural
    tipo: keras_mlp
    params:
      camadas: [16, 8]
      epochs: 80
      batch_size: 16
      learning_rate: 0.01
